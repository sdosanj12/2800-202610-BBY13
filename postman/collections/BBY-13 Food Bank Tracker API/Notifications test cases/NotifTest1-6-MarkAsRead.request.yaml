$kind: http-request
name: NotifTest1-6-MarkAsRead
url: 'http://localhost:3001/api/notifications/{{notifId}}/read'
method: PATCH
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{JWT}}'
scripts:
  - type: afterResponse
    code: |-
      pm.test("200 OK", () => pm.response.to.have.status(200));
      pm.test("notification.read is true", () => pm.expect(pm.response.json().notification.read).to.equal(true));
    language: text/javascript
order: 6
