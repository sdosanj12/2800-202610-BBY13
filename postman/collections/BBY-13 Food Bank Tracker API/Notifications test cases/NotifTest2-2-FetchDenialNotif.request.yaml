$kind: http-request
name: NotifTest2-2-FetchDenialNotif
url: 'http://localhost:3001/api/notifications'
method: GET
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{JWT}}'
scripts:
  - type: afterResponse
    code: |-
      pm.test("200 OK", () => pm.response.to.have.status(200));
      pm.test("notifications contain request-denied type", () => {
        const notifs = pm.response.json().notifications;
        const found = notifs.some(n => n.type === 'request-denied');
        pm.expect(found).to.be.true;
      });
      pm.test("at least one notification message contains Insufficient inventory", () => {
        const notifs = pm.response.json().notifications;
        const found = notifs.some(n => n.message && n.message.includes('Insufficient inventory'));
        pm.expect(found).to.be.true;
      });
    language: text/javascript
order: 9
