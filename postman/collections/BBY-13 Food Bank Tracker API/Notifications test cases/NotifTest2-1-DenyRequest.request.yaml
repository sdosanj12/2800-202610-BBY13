$kind: http-request
name: NotifTest2-1-DenyRequest
url: 'http://localhost:3001/api/requests/{{requestId}}/deny'
method: PATCH
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{JWT}}'
body:
  type: json
  content: |-
    {
      "denialReason": "Insufficient inventory"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("200 OK", () => pm.response.to.have.status(200));
    language: text/javascript
order: 8
