$kind: http-request
name: NotifTest9-2-FetchWithLimit
url: 'http://localhost:3001/api/notifications?limit=1'
method: GET
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{JWT}}'
scripts:
  - type: afterResponse
    code: |-
      pm.test("200 OK", () => pm.response.to.have.status(200));
      pm.test("at most 1 notification", () => pm.expect(pm.response.json().notifications.length).to.be.at.most(1));
    language: text/javascript
order: 23
