$kind: http-request
name: NotifTest1-4-FetchNotifications
url: 'http://localhost:3001/api/notifications'
method: GET
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{JWT}}'
scripts:
  - type: afterResponse
    code: |-
      pm.test("200 OK", () => pm.response.to.have.status(200));
      pm.test("notifications array exists", () => pm.expect(pm.response.json()).to.have.property('notifications'));
      pm.test("at least one notification has type request-approved", () => {
        const notifs = pm.response.json().notifications;
        const found = notifs.some(n => n.type === 'request-approved');
        pm.expect(found).to.be.true;
      });
      pm.test("unreadCount equals 1", () => pm.expect(pm.response.json().unreadCount).to.equal(1));
      pm.environment.set("notifId", pm.response.json().notifications[0]._id);
    language: text/javascript
order: 4
