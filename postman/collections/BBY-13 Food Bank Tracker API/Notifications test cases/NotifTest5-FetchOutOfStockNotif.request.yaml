$kind: http-request
name: NotifTest5-FetchOutOfStockNotif
url: 'http://localhost:3001/api/notifications'
method: GET
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{JWT}}'
scripts:
  - type: afterResponse
    code: |-
      pm.test("200 OK", () => pm.response.to.have.status(200));
      pm.test("notifications contain low-stock type for out of stock", () => {
        const notifs = pm.response.json().notifications;
        const found = notifs.some(n => n.type === 'low-stock' && n.message && n.message.includes('out of stock'));
        pm.expect(found).to.be.true;
      });
    language: text/javascript
order: 15
