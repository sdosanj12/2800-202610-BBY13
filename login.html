<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login – Food Bank Tracker</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <!-- NAV -->
    <nav>
      <a href="index.html" class="nav-brand">Food Bank Tracker</a>
      <ul class="nav-links">
        <li><a href="inventory.html">Inventory</a></li>
        <li><a href="requests.html">Requests</a></li>
        <li><a href="volunteers.html">Volunteers</a></li>
        <li><a href="reports.html">Reports</a></li>
        <li><a href="login.html">Login</a></li>
      </ul>
    </nav>

    <!-- MAIN -->
    <main>
      <div class="login-card">
        <h1>Login</h1>
        <p class="subtitle">Sign in to your Food Bank Tracker account</p>

        <div class="form-group">
          <label for="username">Username or Email</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Enter your username or email"
            autocomplete="username"
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            autocomplete="current-password"
          />
        </div>

        <div class="forgot">
          <a href="#">Forgot password?</a>
        </div>

        <button class="btn-login" type="button">Log In</button>

        <div class="divider">or</div>

        <p class="signup-link">
          Don't have an account? <a href="signup.html">Sign Up</a>
        </p>
      </div>
    </main>

    <!-- FOOTER -->
    <footer>
      <span>© 2026 Food Bank Tracker</span>
      <div class="footer-links">
        <a href="#">Privacy Policy</a>
        <a href="#">Terms of Service</a>
        <a href="#">Contact Support</a>
      </div>
    </footer>
  </body>
</html>
